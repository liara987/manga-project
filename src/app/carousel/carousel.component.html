<div class="carousel" role="region" aria-label="Featured Manga">
  @for (slide of slides(); track slide.id; let i = $index) {
  <div class="slide" [class.active]="i === currentIndex()" [style.background-image]="'url(' + slide.bg + ')'">
    <div class="slide-overlay"></div>
    <div class="slide-content container">
      <div class="slide-text">
        <h2 class="slide-title">{{ slide.title }}</h2>
        <p class="slide-desc">{{ slide.subtitle }}</p>
        <a class="slide-cta" [routerLink]="['/manga', slide.id, slide.title, slide.cover]">Read Now ›
        </a>
      </div>
      <img class="slide-cover" [src]="slide.cover" [alt]="slide.title" loading="lazy" />
    </div>
  </div>
  }

  <button class="carousel-btn prev" (click)="prev()" aria-label="Previous">‹</button>
  <button class="carousel-btn next" (click)="next()" aria-label="Next">›</button>

  <div class="dots">
    @for (slide of slides(); track slide.id; let i = $index) {
    <button class="dot" [class.active]="i === currentIndex()" (click)="goTo(i)"></button>
    }
  </div>
</div>
